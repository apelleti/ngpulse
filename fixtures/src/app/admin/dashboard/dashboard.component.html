<div class="dashboard-container">
  <h2 class="dashboard-title">Dashboard</h2>
  <div [class]="'panel-' + theme">
    <span class="count-display">{{ doubled() }}</span>
  </div>
  <button class="btn-primary" (click)="increment()">+1</button>
  <div [ngClass]="{ active: isActive, highlighted: count() > 5 }">
    <p>Status panel</p>
  </div>
  <ul [ngClass]="['list-styled', 'compact']">
    <li>Item 1</li>
  </ul>
  <div [class.selected]="isActive">Selected item</div>
</div>
